<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Um Presente ❤️</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff4e8b,#ff8fb8);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
background:rgba(255,255,255,.15);
padding:30px;
border-radius:20px;
text-align:center;
color:white;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(0,0,0,.3);
z-index:2;
}

input{
padding:12px;
border:none;
border-radius:10px;
width:220px;
text-align:center;
font-size:18px;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#ff0066;
color:white;
font-size:18px;
cursor:pointer;
}

.heart{
position:absolute;
color:#ff2d75;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}
</style>

</head>
<body>

<div class="container">
<h1>❤️ Um Presente Para Você ❤️</h1>

<p>Digite nossa senha</p>

<input type="password" id="senha">

<br>

<button onclick="abrir()">Abrir Presente</button>

<p id="erro"></p>

</div>

<script>

function abrir(){

if(document.getElementById("senha").value==="12062022"){

window.location.href="https://drive.google.com/file/d/1tE2bUve4iK7mSTzdYa7BUcKh6Ckd73op/view?usp=drivesdk";

}else{

document.getElementById("erro").innerHTML="Senha incorreta ❤️";

}

}

for(let i=0;i<40;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(5+Math.random()*5)+"s";

h.style.fontSize=(15+Math.random()*20)+"px";

document.body.appendChild(h);

}

</script>

</body>
</html>
